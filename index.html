<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- QUESTION -->
  <div id="questionBox" class="card">
    <h1>Are you still mad? 🥺</h1>
    <div class="buttons">
      <button id="yesBtn" class="primary">Yes</button>
      <button onclick="answerNo()" class="secondary">No</button>
    </div>
  </div>

  <!-- POPUP -->
  <div id="popup" class="hidden overlay">
    <div class="popup-box">
      <p>I’m sorry my love, I love you 💖</p>
    </div>
  </div>

  <!-- ENVELOPE -->
  <div id="envelopeSection" class="hidden card">
    <div class="envelope" onclick="openEnvelope()">
      <div class="flap"></div>
      <div class="body"></div>
    </div>
    <p>Tap the envelope 💌</p>
  </div>

  <!-- LETTER -->
  <div id="letter" class="hidden card">
    <div class="letter-content">
      <p id="typedText"></p>
    </div>
  </div>

  <!-- GIFT -->
  <div id="giftSection" class="hidden">
    <button class="gift-btn" onclick="openGift()">🎁 Open your gift</button>
  </div>

</div>

<!-- FLOWER EMOJI MODAL -->
<div id="flowersModal" class="hidden overlay">
  <div class="flowers-box">
    <div class="big-flower">💐</div>
    <h2>For you, my love 💖</h2>
    <button class="back-btn" onclick="goBack()">← Back to message</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
